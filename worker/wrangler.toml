name = "blog"
main = "src/index.js"
compatibility_date = "2026-04-08"

# ─── 数据库 ────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "xiaogai-blog"
database_id = "747c1f9d-b5d4-4375-b97b-07ed402c2822"

# ─── 对象存储 ─────────────────────────────────────────────────
[[r2_buckets]]
binding = "UPLOADS_BUCKET"
bucket_name = "xiaogai-blog-uploads"

# ─── KV 存储（速率限制）───────────────────────────────────────
[[kv_namespaces]]
binding = "ratelimit"
id = "9642451af4984d1eb5fcc28ca0fb892a"

# ─── 环境变量（生产环境请在 Dashboard 中配置）────────────────
[vars]
SITE_TITLE = "忒卷"
ADMIN_TOKEN_TTL_DAYS = "30"

# ⚠️ 必须配置：后台登录口令（至少 12 位）
# ADMIN_PASSWORD = "your-secure-password-here"

# 可选：固定站点地址
# SITE_URL = "https://your-domain.com"

# 可选：图片公网前缀
# R2_PUBLIC_URL = "https://pub-xxx.r2.dev"


