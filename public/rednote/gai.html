    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js"></script>

    <script>
        // 鏍囩椤靛垏鎹?        function switchTab(tabIndex) {
            const tabs = document.querySelectorAll('.tab-content');
            const btns = document.querySelectorAll('.tab-btn');
            
            tabs.forEach(tab => tab.classList.remove('active'));
            btns.forEach(btn => btn.classList.remove('active'));
            
            document.getElementById('tab-' + tabIndex).classList.add('active');
            event.target.classList.add('active');
        }

        const preferredFonts = [
            '鎬濇簮瀹嬩綋 CN',
            'Source Han Serif CN',
            'Source Han Serif SC'
        ];

        function isFontAvailable(fontName) {
            const text = 'Aa涓崍娴嬭瘯123';
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            if (!context) return false;

            context.font = '32px monospace';
            const baselineWidth = context.measureText(text).width;

            context.font = `32px "${fontName}", monospace`;
            const candidateWidth = context.measureText(text).width;

            return Math.abs(candidateWidth - baselineWidth) > 0.1;
        }

        function detectAvailableFont() {
            for (const fontName of preferredFonts) {
                if (isFontAvailable(fontName)) {
                    return fontName;
                }
            }

            return null;
        }

        function updateFontWarning() {
            const warning = document.getElementById('fontWarning');
            if (!warning) return;

            const availableFont = detectAvailableFont();
            if (availableFont) {
                warning.classList.remove('visible');
                warning.textContent = '';
                return;
            }

            warning.textContent = '褰撳墠鐢佃剳鏈娴嬪埌鎸囧畾瀛椾綋锛堟€濇簮瀹嬩綋 CN / Source Han Serif锛夛紝椤甸潰浼氬洖閫€鍒扮郴缁熻‖绾垮瓧浣擄紝瀵煎嚭鐨勬帓鐗堝彲鑳藉拰棰勬湡涓嶄竴鑷淬€?;
            warning.classList.add('visible');
        }

        function renderEmoji(root) {
            if (!root || typeof twemoji === 'undefined') return;
            twemoji.parse(root, { folder: 'svg', ext: '.svg' });
        }

        // ========== 鏍峰紡1鐨勮剼鏈?==========
        const punctuationMarks = /^[锛屻€傦紒锛燂紱锛毬封€︹€斻€屻€嶃€庛€忥紙锛夈€?"]/;
        const openingQuotes = /^["銆屻€嶿/;

        function setCurrentDate() {
            const today = new Date();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            document.getElementById('dateDisplay').textContent = `${month}/${day}`;
        }

        function fixPunctuation(text) {
            let result = '';
            let i = 0;

            while (i < text.length) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (punctuationMarks.test(char)) {
                    if (result.length > 0 && result[result.length - 1] === '\n') {
                        result = result.slice(0, -1);
                    }

                    if (openingQuotes.test(char) && result.length > 0 && result[result.length - 1] === '\n') {
                        result = result.slice(0, -1);
                        const lastNewline = result.lastIndexOf('\n');
                        const lineStart = lastNewline === -1 ? 0 : lastNewline + 1;
                        const currentLine = result.substring(lineStart);

                        const lineEndChar = currentLine.slice(-1);
                        if (!punctuationMarks.test(lineEndChar)) {
                            result += '<span class="quote-space"></span>';
                        }
                    }
                }
                result += char;
                i++;
            }

            return result;
        }

        document.getElementById('avatarInput').addEventListener('change', function(e) {
            const files = e.target.files;
            for (let i = 0; i < files.length; i++) {
                if (files[i].name === 'xg.jpg') {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        document.getElementById('avatarImg').src = event.target.result;
                    };
                    reader.readAsDataURL(files[i]);
                    break;
                }
            }
        });

        if (document.fonts && typeof document.fonts.ready === 'object') {
            document.fonts.ready.then(updateFontWarning);
        } else {
            updateFontWarning();
        }

        function submitContent() {
            let content = document.getElementById('contentInput').value;
            const contentDisplay = document.getElementById('contentDisplay');

            if (content.trim()) {
                const lines = content.split('\n');
                const processedElements = [];
                let currentParagraphs = [];

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i];
                    
                    if (line.trim().startsWith('#### ')) {
                        if (currentParagraphs.length > 0) {
                            const paragraphText = processParagraph(currentParagraphs);
                            if (paragraphText) {
                                processedElements.push(`<div class="paragraph">${paragraphText}</div>`);
                            }
                            currentParagraphs = [];
                        }
                        
                        const titleText = line.trim().replace(/^####\s+/, '');
                        processedElements.push(`<div class="title-section"><h4>${titleText}</h4></div>`);
                    } else if (line.trim()) {
                        currentParagraphs.push(line);
                    } else {
                        if (currentParagraphs.length > 0) {
                            const paragraphText = processParagraph(currentParagraphs);
                            if (paragraphText) {
                                processedElements.push(`<div class="paragraph">${paragraphText}</div>`);
                            }
                            currentParagraphs = [];
                        }
                    }
                }

                if (currentParagraphs.length > 0) {
                    const paragraphText = processParagraph(currentParagraphs);
                    if (paragraphText) {
                        processedElements.push(`<div class="paragraph">${paragraphText}</div>`);
                    }
                }

                contentDisplay.innerHTML = processedElements.join('');
                renderEmoji(contentDisplay);
                applyUniformJustifyToCoverParagraphs();
                protectCoverNonBreakingUnits();
            } else {
                showToast('璇疯緭鍏ュ唴瀹?, 'error');
            }
        }

        function processParagraph(lines) {
            let text = lines.join('\n').trim();

            text = text.replace(/([锛屻€傦紒锛燂紱锛毬封€︹€斻€屻€嶃€庛€忥紙锛夈€?"]+)([""銆屻€嶿+)/g,
                '$1<span class="quote-space"></span>$2');

            text = fixPunctuation(text);

            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');

            text = text.replace(/\n/g, '<br>');

            return text;
        }

        function applyUniformJustifyToCoverParagraphs() {
            const contentDisplay = document.getElementById('contentDisplay');
            const paragraphs = contentDisplay.querySelectorAll('.paragraph');

            paragraphs.forEach(p => {
                const hasLineBreak = p.querySelector('br');
                const hasUnsupportedInline = Array.from(p.childNodes).some(
                    node => node.nodeType === Node.ELEMENT_NODE && node.tagName !== 'BR'
                );
                if (hasLineBreak || hasUnsupportedInline) return;

                const raw = normalizeCjkSpacing(p.textContent || '').trim();
                if (!raw) return;

                const style = window.getComputedStyle(p);
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.font = `${style.fontWeight} ${style.fontSize} ${style.fontFamily}`;

                const maxWidth = p.clientWidth || contentDisplay.clientWidth;
                const tokens = tokenizeCoverText(raw);
                const lines = [];
                let currentLine = [];
                let currentWidth = 0;

                tokens.forEach(token => {
                    const tokenWidth = ctx.measureText(token).width;
                    if (currentLine.length > 0 && currentWidth + tokenWidth > maxWidth) {
                        while (currentLine.length > 0 && /^\s+$/.test(currentLine[currentLine.length - 1])) {
                            const trimmed = currentLine.pop();
                            currentWidth -= ctx.measureText(trimmed).width;
                        }
                        lines.push(currentLine);
                        currentLine = [];
                        currentWidth = 0;
                        if (!/^\s+$/.test(token)) {
                            currentLine.push(token);
                            currentWidth += tokenWidth;
                        }
                    } else if (!(currentLine.length === 0 && /^\s+$/.test(token))) {
                        currentLine.push(token);
                        currentWidth += tokenWidth;
                    }
                });

                if (currentLine.length > 0) {
                    lines.push(currentLine);
                }

                if (lines.length === 0) return;

                p.classList.add('uniform-justify');
                p.innerHTML = '';

                lines.forEach((lineTokens, idx) => {
                    const line = document.createElement('div');
                    const isLast = idx === lines.length - 1;
                    line.className = `paragraph-line ${isLast ? 'last' : 'justified'}`;

                    lineTokens.forEach(token => {
                        const unit = document.createElement('span');
                        unit.className = 'paragraph-unit';
                        unit.textContent = token;
                        line.appendChild(unit);
                    });

                    p.appendChild(line);
                });
            });
        }

        function tokenizeCoverText(text) {
            const tokens = [];
            const source = (text || '').replace(/\s+/g, ' ');
            const percentToken = /\d+(?:\.\d+)?\s*[%锛匽/y;
            const englishWord = /[A-Za-z0-9]+(?:['-][A-Za-z0-9]+)*/y;
            const ellipsisToken = /鈥2,}/y;
            const disallowedLineStart = /[锛屻€傦紒锛燂紱锛氥€?.!?;:锛塡)\]銆戙€嬨€嶃€忊€濃€橾/;
            let i = 0;

            while (i < source.length) {
                percentToken.lastIndex = i;
                const percentMatch = percentToken.exec(source);
                if (percentMatch) {
                    tokens.push(percentMatch[0]);
                    i = percentToken.lastIndex;
                    continue;
                }

                ellipsisToken.lastIndex = i;
                const ellipsisMatch = ellipsisToken.exec(source);
                if (ellipsisMatch) {
                    if (tokens.length > 0 && !/^\s+$/.test(tokens[tokens.length - 1])) {
                        tokens[tokens.length - 1] += ellipsisMatch[0];
                    } else {
                        tokens.push(ellipsisMatch[0]);
                    }
                    i = ellipsisToken.lastIndex;
                    continue;
                }

                englishWord.lastIndex = i;
                const wordMatch = englishWord.exec(source);
                if (wordMatch) {
                    tokens.push(wordMatch[0]);
                    i = englishWord.lastIndex;
                    continue;
                }

                const ch = source[i];
                if (disallowedLineStart.test(ch) && tokens.length > 0) {
                    tokens[tokens.length - 1] += ch;
                } else {
                    tokens.push(ch);
                }
                i += 1;
            }

            return tokens;
        }

        function protectCoverNonBreakingUnits() {
            const contentDisplay = document.getElementById('contentDisplay');
            const paragraphs = contentDisplay.querySelectorAll('.paragraph');

            paragraphs.forEach(p => {
                if (p.classList.contains('uniform-justify')) return;
                wrapCoverProtectedText(p);
            });
        }

        function wrapCoverProtectedText(root) {
            const pattern = /[^\s]鈥2,}|\d+(?:\.\d+)?\s*[%锛匽|鈥2,}/g;
            const textNodes = [];
            const walker = document.createTreeWalker(
                root,
                NodeFilter.SHOW_TEXT,
                {
                    acceptNode(node) {
                        if (!node.textContent || !pattern.test(node.textContent)) {
                            return NodeFilter.FILTER_REJECT;
                        }
                        pattern.lastIndex = 0;
                        if (node.parentElement && node.parentElement.closest('.keep-together')) {
                            return NodeFilter.FILTER_REJECT;
                        }
                        return NodeFilter.FILTER_ACCEPT;
                    }
                }
            );

            let node;
            while (node = walker.nextNode()) {
                textNodes.push(node);
            }

            textNodes.forEach(textNode => {
                pattern.lastIndex = 0;
                const text = textNode.textContent;
                if (!pattern.test(text)) {
                    pattern.lastIndex = 0;
                    return;
                }
                pattern.lastIndex = 0;

                const fragment = document.createDocumentFragment();
                let lastIndex = 0;
                let match;

                while (match = pattern.exec(text)) {
                    if (match.index > lastIndex) {
                        fragment.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
                    }
                    const span = document.createElement('span');
                    span.className = 'keep-together';
                    span.textContent = match[0];
                    fragment.appendChild(span);
                    lastIndex = pattern.lastIndex;
                }

                if (lastIndex < text.length) {
                    fragment.appendChild(document.createTextNode(text.slice(lastIndex)));
                }

                textNode.parentNode.replaceChild(fragment, textNode);
            });
        }

        async function waitForFonts() {
            if (document.fonts && document.fonts.ready) {
                await document.fonts.ready;
            }
        }

        async function exportAsImage() {

            try {

                document.body.appendChild(link);

                showToast('瀵煎嚭鎴愬姛', 'success');
            } catch (error) {

                showToast('瀵煎嚭澶辫触锛? + error.message, 'error');
            } finally {
                // 鎭㈠缂╂斁鍜岀Щ闄xporting绫?                if (previewContent) previewContent.style.transform = originalTransform;
                if (document.body) document.body.classList.remove('exporting');

        }

        document.getElementById('contentInput').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                submitContent();
            }
        });

        setCurrentDate();

        // ========== 鏍峰紡2鐨勮剼鏈?==========
        function normalizeCjkSpacing(text) {
            return text
                .replace(/[\u00A0\u3000]/g, ' ')
                .replace(/([\u4e00-\u9fff])\s+(?=[\u4e00-\u9fff])/g, '$1')
                .replace(/([\u4e00-\u9fff])\s+(?=[锛屻€傦紒锛燂紱锛氥€乚)/g, '$1')
                .replace(/([锛屻€傦紒锛燂紱锛氥€乚)\s+(?=[\u4e00-\u9fff])/g, '$1')
                .replace(/([\u4e00-\u9fff])\s+(?=[A-Za-z0-9])/g, '$1 ')
                .replace(/([A-Za-z0-9])\s+(?=[\u4e00-\u9fff])/g, '$1 ');
        }

        async function submitContent2() {
            await waitForFonts();

            const content = document.getElementById('contentInput2').value;
            let html = marked.parse(content, { breaks: true });
            const temp = document.createElement('div');
            temp.innerHTML = html;

            document.getElementById('previewText').innerHTML = '';
            while (temp.firstChild) {
                document.getElementById('previewText').appendChild(temp.firstChild);
            }

            renderEmoji(document.getElementById('previewText'));
            applyUniformJustifyToParagraphs();
            
            // 澶勭悊鏍囩偣绗﹀彿涓嶈兘鍦ㄨ棣?            movePunctuationFromLineStart();
            alignLinkParagraphsLeft();
            protectBodyNonBreakingUnits();
        }

        function applyUniformJustifyToParagraphs() {
            const previewText = document.getElementById('previewText');
            const paragraphs = previewText.querySelectorAll('p');

            paragraphs.forEach(p => {
                const hasInlineElements = Array.from(p.childNodes).some(
                    n => n.nodeType === Node.ELEMENT_NODE && n.tagName !== 'BR'
                );
                const hasLineBreak = p.querySelector('br');
                if (hasLineBreak) return;
                if (hasInlineElements) return;

                const raw = normalizeCjkSpacing(p.textContent || '').trim();
                if (!raw) return;

                const style = window.getComputedStyle(p);
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.font = `${style.fontWeight} ${style.fontSize} ${style.fontFamily}`;

                const maxWidth = p.clientWidth || previewText.clientWidth;
                const chars = tokenizeUniformText(raw);
                const lines = [];
                let currentLine = [];
                let currentWidth = 0;

                chars.forEach(ch => {
                    const charWidth = ctx.measureText(ch).width;
                    if (currentLine.length > 0 && currentWidth + charWidth > maxWidth) {
                        while (currentLine.length > 0 && /^\s+$/.test(currentLine[currentLine.length - 1])) {
                            const trimmed = currentLine.pop();
                            currentWidth -= ctx.measureText(trimmed).width;
                        }
                        lines.push(currentLine);
                        currentLine = [];
                        currentWidth = 0;
                        if (!/^\s+$/.test(ch)) {
                            currentLine.push(ch);
                            currentWidth += charWidth;
                        }
                    } else if (!(currentLine.length === 0 && /^\s+$/.test(ch))) {
                        currentLine.push(ch);
                        currentWidth += charWidth;
                    }
                });

                if (currentLine.length > 0) {
                    lines.push(currentLine);
                }

                p.classList.add('uniform-justify');
                p.innerHTML = '';

                lines.forEach((lineChars, idx) => {
                    const line = document.createElement('div');
                    const isLast = idx === lines.length - 1;
                    line.className = `uniform-line ${isLast ? 'last' : 'justified'}`;

                    lineChars.forEach(ch => {
                        const unit = document.createElement('span');
                        unit.className = 'uniform-unit';
                        unit.textContent = ch;
                        line.appendChild(unit);
                    });

                    p.appendChild(line);
                });
            });
        }

        function tokenizeUniformText(text) {
            return tokenizeCoverText(text);
        }

        function protectBodyNonBreakingUnits() {
            const previewText = document.getElementById('previewText');
            const paragraphs = previewText.querySelectorAll('p');

            paragraphs.forEach(p => {
                if (p.classList.contains('uniform-justify')) return;
                wrapCoverProtectedText(p);
            });
        }

        function movePunctuationFromLineStart() {
            const previewText = document.getElementById('previewText');
            const walker = document.createTreeWalker(
                previewText,
                NodeFilter.SHOW_ELEMENT,
                null,
                false
            );
            
            let node;
            while (node = walker.nextNode()) {
                if (node.classList.contains('punctuation') && node.dataset.punctuation !== '锛?) {
                    // 妫€鏌ヨ繖涓爣鐐规槸鍚﹀湪琛岄
                    const prevNode = node.previousSibling;
                    if (!prevNode || (prevNode.nodeType === Node.TEXT_NODE && /\n$/.test(prevNode.textContent))) {
                        // 灏濊瘯鎵惧埌鍓嶄竴涓潪绌虹櫧瀛楃锛屽皢鏍囩偣绉诲埌瀹冨悗闈?                        let current = node.previousSibling;
                        while (current) {
                            if (current.nodeType === Node.TEXT_NODE) {
                                const text = current.textContent;
                                if (text.trim()) {
                                    // 鎵惧埌浜嗗墠闈㈢殑鏂囧瓧锛屾妸鏍囩偣绉昏繃鍘?                                    const punct = node.textContent;
                                    current.textContent = text + punct;
                                    node.parentNode.removeChild(node);
                                    break;
                                }
                            } else if (current.nodeType === Node.ELEMENT_NODE) {
                                // 濡傛灉鏄厓绱犺妭鐐癸紝灏濊瘯浠庡叾鏈€鍚庝竴涓瓙鑺傜偣缁х画
                                if (current.lastChild && current.lastChild.nodeType === Node.TEXT_NODE) {
                                    const text = current.lastChild.textContent;
                                    if (text.trim()) {
                                        const punct = node.textContent;
                                        current.lastChild.textContent = text + punct;
                                        node.parentNode.removeChild(node);
                                        break;
                                    }
                                }
                            }
                            current = current.previousSibling;
                        }
                    }
                }
            }
        }

        function alignLinkParagraphsLeft() {
            const previewText = document.getElementById('previewText');
            const paragraphs = previewText.querySelectorAll('p');
            paragraphs.forEach(p => {
                if (p.querySelector('a')) {

                // 缁樺埗鍘熷鍐呭

                link.href = finalCanvas.toDataURL('image/png');
                link.click();

            } catch (error) {

                showToast('瀵煎嚭澶辫触锛? + error.message, 'error');
            } finally {

        document.getElementById('contentInput2').addEventListener('keydown', function(e) {

            await submitContent2();
        });
