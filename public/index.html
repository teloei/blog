<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>忒卷</title>
  <meta name="description" content="忒卷的个人博客，记录有意思的事情。">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono:wght@400;500&family=Noto+Serif+SC:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css?v=2026041501">
</head>
<body data-page="home">
  <script>(function(){var m=localStorage.getItem('xiaogai-display-mode');if(m==='day'){document.body.className='light';}else if(m==='sunny'||!m){document.body.className='light sunny';}/* night: no class needed */})();</script>
  <div class="noise"></div>
  <video id="leaves-overlay" src="./leaves.mp4" loop muted playsinline preload="none"></video>
  <audio id="forest-audio" src="./forest.mp3" loop preload="none"></audio>
  <div class="sun-glow"></div>
  <div class="light-shaft light-shaft-1"></div>
  <div class="light-shaft light-shaft-2"></div>
  <div class="light-shaft light-shaft-3"></div>

  <div class="mode-indicator">
    <a class="subtle-link mode-link" href="./admin.html">CMS</a>
    <div class="mode-dot" id="dot-night"></div>
    <div class="mode-dot" id="dot-day"></div>
    <div class="mode-dot" id="dot-sunny"></div>
  </div>

  <main class="page">
    <section class="hero home-hero">
      <div class="logo">
        <button class="logo-letter" data-mode="day">
          忒
          <span class="logo-hint">Something</span>
        </button>
        <button class="logo-letter" data-mode="sunny">
          卷
          <span class="logo-hint">Interesting</span>
        </button>
      </div>
      <p class="bio">做有意思的事情。</p>
    </section>

    <div class="divider"></div>

    <section class="section home-stream-section">
      <div class="section-head">
        <div></div>
      </div>
      <div id="posts-list" class="entries"></div>
      <div id="posts-empty" class="empty-state hidden">还没有发布文章。你可以先去后台写第一篇。</div>
      <div id="home-posts-pagination" class="home-pagination"></div>
    </section>

    <div class="divider"></div>

    <section class="section connect-section">
      <div class="section-title">Connect</div>
      <div id="connect-links" class="links links-connect"></div>
    </section>

    <footer class="site-footer">
      <span class="footer-text">忒卷 · %YEAR%</span>
    </footer>
  </main>

  <button id="back-to-top" class="back-to-top" type="button" title="回到顶部">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <div class="shortcuts-hint">
    <kbd>D</kbd> day &nbsp; <kbd>N</kbd> night &nbsp; <kbd>S</kbd> sunny
  </div>

  <script src="./cloudbase-config.js"></script>
  <script src="./app.js?v=2026041501"></script>
</body>
</html>
